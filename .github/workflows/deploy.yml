# GitHub Actions para validar build antes de deploy
# EasyPanel desplegará automáticamente cuando pase este workflow

name: Build Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: |
          cd apps/api
          npx prisma generate
      
      - name: Build Backend
        run: npm run build --workspace=@nexohub/api

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Frontend
        run: npm run build --workspace=@nexohub/web
        env:
          VITE_API_URL: https://api.example.com/api
